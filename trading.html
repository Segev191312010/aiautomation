<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d1117" />
  <title>TradeBot</title>
  <link rel="stylesheet" href="/static/trading.css" />
</head>
<body>
  <div id="app">
    <header id="app-header">
      <div id="header-left">
        <button id="back-btn" class="icon-btn hidden" aria-label="Back">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
          </svg>
        </button>
        <h1 id="page-title">TradeBot</h1>
      </div>
      <div id="header-right">
        <span id="conn-badge" class="badge badge-offline">IBKR</span>
        <span id="bot-badge" class="badge badge-stopped">BOT</span>
      </div>
    </header>

    <main id="view"></main>

    <nav id="bottom-nav">
      <button class="nav-btn active" data-route="dashboard">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
          <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/>
        </svg>
        <span>Dashboard</span>
      </button>
      <button class="nav-btn" data-route="positions">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
          <path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/>
        </svg>
        <span>Positions</span>
      </button>
      <button class="nav-btn" data-route="rules">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
          <path d="M3 18h6v-2H3v2zM3 6v2h18V6H3zm0 7h12v-2H3v2z"/>
        </svg>
        <span>Rules</span>
      </button>
      <button class="nav-btn" data-route="market">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
          <path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99z"/>
        </svg>
        <span>Market</span>
      </button>
      <button class="nav-btn" data-route="watchlist">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>
        </svg>
        <span>Watch</span>
      </button>
      <button class="nav-btn" data-route="trades">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
          <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
        </svg>
        <span>Trades</span>
      </button>
    </nav>
  </div>

  <!-- Floating Trade Button -->
  <button id="fab-trade" title="Place Order" aria-label="Place Order">
    <svg viewBox="0 0 24 24" width="26" height="26" fill="currentColor">
      <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14l-5-5 1.41-1.41L11 13.17l7.59-7.59L20 7l-8 10z"/>
    </svg>
  </button>

  <!-- Toast -->
  <div id="toast" class="hidden" role="status" aria-live="polite"></div>

  <!-- Modal backdrop + sheet -->
  <div id="modal-backdrop" class="hidden"></div>
  <div id="modal" class="hidden" role="dialog" aria-modal="true">
    <div class="modal-handle"></div>
    <div id="modal-content"></div>
  </div>

  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
  <script src="/static/trading.js"></script>
</body>
</html>
